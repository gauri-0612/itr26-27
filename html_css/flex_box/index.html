<!DOCTYPE html>
<html>
    <head>
        <title>Flexbox Example</title>
        <style>
            .container {
                display: flex;
                justify-content: space-around;
                align-items: center;
                height: 300px;
                border: 2px solid black;
            }
            .box {
                width: 100px;
                height: 100px;
                background-color: lightblue;
                border: 2px solid blue;
                text-align: center;
                line-height: 100px;
                font-size: 20px;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <h2>Flexbox Model Example</h2>
        <div class="container">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
        </div>
        
    </body>
</html>
